{% extends 'base.html' %}
{% block content %}
<section class="login-section">
    <h2 class="login-title">IdeaNest</h2>
    <p class="login-subtitle">Neural Interface Portal</p>

    {% if error %}
        <div class="error-message">
            <p>Invalid email or password. Please try again.</p>
        </div>
    {% endif %}

    <form method="post" class="login-form">
        {% csrf_token %}
        <label for="id_email">IDENTIFIER (EMAIL)</label><br><br>
        <input type="email" id="id_email" name="email" placeholder="user@proto.nest" required>|<br>

        <label for="id_password">ENCRYPTION KEY (PASSWORD)</label><br><br>
        <input type="password" id="id_password" name="password" placeholder="••••••••" required><br>

        <button type="submit" class="btn-glow">STITCH LOGIN</button>
    </form>

    <div class="alt-login">
        <p>OR CONNECT VIA PATCH</p>
       <a href="https://github.com/Alex-Rahul/Workshop_Django_Full-stack" target="_blank" class="btn-alt">GitHub</a>

        <button class="btn-alt" >Terminal</button>
    </div>

    <p class="new-thread">NEW THREAD? <a href="/users/register/">INITIALIZE ACCOUNT</a></p>
</section>
{% endblock %}

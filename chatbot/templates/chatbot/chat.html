{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="chat-container">
    <h2 class="chat-title">StartiQChat</h2>

    <div class="chat-window">
        {% for msg in messages %}
            <div class="chat-message {{ msg.sender }}">
                <p>{{ msg.text }}</p>
            </div>
        {% endfor %}
    </div>

    <form class="chat-input" method="post">
        {% csrf_token %}
        <input type="text" name="message" placeholder="Type your message..." required>
        <button type="submit" class="btn-glow">➤</button>
    </form>
</div>
{% endblock %}

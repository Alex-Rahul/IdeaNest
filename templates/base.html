{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>


    <meta charset="UTF-8">
    <title>IdeaNest</title>

    <style>
        /* Global reset */
body {
    background: #02040a;
    margin: 0;
    padding: 0;
    overflow-x: hidden;
    font-family: 'Segoe UI', sans-serif;
    color: #f5f8fb;
    min-height: 100vh;
}

/* Particle canvas background */
#particle-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1; /* behind everything */
}

/* Navbar */
.navbar {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 2rem;
    gap: 1rem;
    background: transparent;
}
.navbar ul {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    margin: 0;
    padding: 0;
    list-style: none;
}
.navbar a {
    color: rgba(245, 248, 251, 0.9);
    text-decoration: none;
    font-size: 0.95rem;
    transition: color 0.2s ease;
}
.navbar a:hover {
    color: #38f7ff;
}

/* Container */
.container {
    max-width: 1200px;
    margin: 4rem auto 3rem;
    padding: 0 1.5rem;
    text-align: center;
}
.container h1 {
    font-size: clamp(2.5rem, 4vw, 4rem);
    margin-bottom: 0.75rem;
    color: #ffffff;
    letter-spacing: 0.04em;
}
.container p {
    margin: 0 auto;
    max-width: 680px;
    font-size: 1.05rem;
    color: #cbd5e1;
}

/* Dashboard panels */
.dashboard {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 1.5rem;
    margin-top: 3rem;
}
.panel {
    background: rgba(14, 17, 28, 0.94);
    border: 1px solid rgba(0, 255, 255, 0.16);
    backdrop-filter: blur(18px);
    padding: 1.9rem 1.6rem;
    min-height: 170px;
    border-radius: 22px;
    text-align: center;
    box-shadow: 0 18px 50px rgba(0, 255, 255, 0.08);
    transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
}
.panel h3 {
    margin: 0;
    font-size: 1.3rem;
    color: #37f0ff;
    letter-spacing: 0.06em;
    text-transform: uppercase;
}
.panel p {
    margin-top: 1rem;
    font-size: 0.98rem;
    color: #e7edf8;
    line-height: 1.6;
}
.panel p a {
    color: inherit;
    text-decoration: none;
}
.panel p a:hover {
    color: #67f7ff;
}
.panel:hover {
    transform: translateY(-6px);
    box-shadow: 0 25px 70px rgba(0, 255, 255, 0.16);
    border-color: rgba(56, 247, 255, 0.32);
}



/* Logo section */
.logo {
    display: flex;
    align-items: center;
    gap: 0.5rem;
}
.logo img {
    height: 40px;
    width: 40px;
}
.logo .brand {
    font-size: 1.1rem;
    font-weight: 700;
    color: #00ffff; /* Neon accent */
    letter-spacing: 0.18em;
    text-transform: uppercase;
}



/* API Section */
.api-section {
    text-align: center;
    padding: 3rem;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: #fff;
    border-radius: 12px;
    box-shadow: 0 0 25px rgba(0,255,255,0.4);
}

.api-title {
    font-size: 2.5rem;
    color: #00ffff;
    text-shadow: 0 0 10px #00ffff;
}

.api-subtitle {
    font-size: 1.2rem;
    margin-bottom: 2rem;
    color: #ccc;
}

.api-console {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 1.5rem;
}

.endpoint-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid #00ffff;
    border-radius: 10px;
    padding: 1.5rem;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.endpoint-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 20px #00ffff;
}

.btn-glow {
    background: #00ffff;
    color: #000;
    border: none;
    padding: 0.6rem 1.2rem;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s ease;
}
.btn-glow:hover {
    background: #ff00ff;
    color: #fff;
    box-shadow: 0 0 15px #ff00ff;
}

/* Login Section */
.login-section {
    max-width: 400px;
    margin: 80px auto;
    padding: 30px;
    background: rgba(0, 0, 0, 0.7);
    border-radius: 12px;
    box-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
    color: #00ffff;
}

.login-section h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #00ffff;
    text-shadow: 0 0 10px #00ffff;
}

.login-form .form-group {
    margin-bottom: 15px;
}

.login-form input {
    width: 100%;
    padding: 10px;
    border: 1px solid #00ffff;
    border-radius: 6px;
    background: #111;
    color: #00ffff;
    outline: none;
    transition: box-shadow 0.3s ease;
}

.login-form input:focus {
    box-shadow: 0 0 10px #00ffff;
}

.login-form button {
    width: 100%;
    padding: 12px;
    background: #00ffff;
    border: none;
    border-radius: 6px;
    color: #111;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s ease, box-shadow 0.3s ease;
}

.login-form button:hover {
    background: #0ff;
    box-shadow: 0 0 15px #00ffff;
}



.btn-glow {
    margin-top: 1.5rem;
    width: 100%;
    background: #00ffff;
    color: #000;
    border: none;
    padding: 0.8rem;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s ease;
}
.btn-glow:hover {
    background: #ff00ff;
    color: #fff;
    box-shadow: 0 0 15px #ff00ff;
}

.alt-login {
    margin-top: 2rem;
}
.btn-alt {
    background: transparent;
    border: 1px solid #00ffff;
    color: #00ffff;
    padding: 0.6rem 1.2rem;
    margin: 0.3rem;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.3s ease;
}
.btn-alt:hover {
    background: #00ffff;
    color: #000;
}

.new-thread {
    margin-top: 2rem;
    font-size: 0.9rem;
}
.new-thread a {
    color: #ff00ff;
    text-decoration: none;
}

/* Ideas list */
.idea-list {
    list-style: none;
    padding: 0;
    margin: 20px auto;
    max-width: 600px;
}

.idea-item {
    margin: 12px 0;
    padding: 12px;
    background: rgba(0,255,255,0.05);
    border: 1px solid #00ffff;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,255,255,0.3);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.idea-item a {
    color: #00ffff;
    text-decoration: none;
    font-weight: bold;
}

.idea-item:hover {
    transform: translateY(-3px);
    box-shadow: 0 0 15px #00ffff;
    border-color: #ff00ff;
}


.dashboard-panels {
    display: flex;
    justify-content: center;
    gap: 2rem;
    flex-wrap: wrap;
    margin-top: 2rem;
}

.panel {
    background: rgba(0,255,255,0.05);
    border: 1px solid #00ffff;
    border-radius: 5px;
    padding: 1.5rem;
    flex: 1 1 250px;
    text-align: center;
    box-shadow: 0 0 12px rgba(0,255,255,0.3);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.panel:hover {
    transform: translateY(-4px);
    box-shadow: 0 0 20px #949c9c;
    border-color: #ff00ff;
}


/* Chat container */
.chat-section {
    max-width: 800px;
    margin: 40px auto;
    padding: 20px;
    background: rgba(20, 20, 30, 0.9); /* keep your default dark style */
    border-radius: 12px;
    box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
}

/* Chat window */
.chat-window {
    display: flex;
    flex-direction: column;
    gap: 12px;
    height: 400px;
    overflow-y: auto;
    padding: 15px;
    background: #111; /* default dark background */
    border: 1px solid #00ffff;
    border-radius: 8px;
}

/* User messages â†’ white background, aligned right */
.chat-message.user {
    max-width: 70%;
    margin-left: auto;
    padding: 10px 15px;
    background: #fff; /* white background */
    color: #000;      /* black text */
    border-radius: 10px 0 10px 10px;
    box-shadow: 0 0 8px rgba(0,0,0,0.2);
    text-align: right;
}

/* AI messages â†’ default neon style, aligned left */
.chat-message.ai {
    max-width: 70%;
    margin-right: auto;
    padding: 10px 15px;
    background: rgba(0, 255, 255, 0.1);
    border: 1px solid #00ffff;
    color: #00ffff;
    border-radius: 0 10px 10px 10px;
    text-align: left;
    box-shadow: 0 0 12px rgba(0,255,255,0.4);
}

/* Input bar */
.chat-input {
    display: flex;
    margin-top: 15px;
}

.chat-input input {
    flex: 1;
    padding: 10px;
    border: 1px solid #00ffff;
    border-radius: 8px;
    background: #111;
    color: #fff;
}

.chat-input button {
    margin-left: 8px;
    padding: 10px 15px;
    background: #00ffff;
    color: #111;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.chat-input button:hover {
    background: #33ffff;
    box-shadow: 0 0 10px #00ffff;
}



/* Register Container */
.register-section {
    max-width: 500px;
    margin: 60px auto;
    padding: 30px;
    background: rgba(0, 0, 0, 0.75);
    border-radius: 12px;
    border: 2px solid #00ffff;
    box-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
}

/* Title */
.register-section h2 {
    text-align: center;
    margin-bottom: 25px;
    color: #00ffff;
    text-shadow: 0 0 12px #00ffff;
}

/* Form Layout */
.register-form .form-group {
    margin-bottom: 18px;
    display: flex;
    flex-direction: column;
}

.register-form label {
    margin-bottom: 6px;
    font-weight: bold;
    color: #00ffff;
    text-shadow: 0 0 6px #00ffff;
}

/* Inputs */
.register-form input,
.register-form select {
    padding: 12px;
    border: 1px solid #00ffff;
    border-radius: 6px;
    background: #111;
    color: #00ffff;
    outline: none;
    transition: box-shadow 0.3s ease;
}

.register-form input:focus,
.register-form select:focus {
    box-shadow: 0 0 10px #00ffff;
}

/* File Upload */
.register-form input[type="file"] {
    border: none;
    color: #00ffff;
}

/* Button */
.btn-glow {
    width: 100%;
    padding: 12px;
    background: #00ffff;
    border: none;
    border-radius: 6px;
    color: #111;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.3s ease, box-shadow 0.3s ease;
}

.btn-glow:hover {
    background: #0ff;
    box-shadow: 0 0 15px #00ffff;
}


/* ===== Reports Page ===== */
.reports-container {
    max-width: 900px;
    margin: 40px auto;
    padding: 20px;
}

.report-card {
    background: rgba(0, 255, 255, 0.05); /* translucent dark panel */
    border: 1px solid #00ffff;
    color: #00ffff;
    padding: 20px;
    margin: 15px 0;
    border-radius: 10px;
    box-shadow: 0 0 12px rgba(0,255,255,0.3);
    transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
}
.report-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 0 20px #00ffff;
    border-color: #ff00ff; /* glow shift on hover */
    color: #ff00ff;        /* text glow shift */
}

.reports-title {
    text-align: center;
    color: #00ffff;
    margin-bottom: 25px;
    text-shadow: 0 0 12px #00ffff;
}

    </style>
    <script>
        // Aqua particle animation - slow, blurred, semi-transparent
const canvas = document.getElementById("particle-canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function initParticles() {
    particles = [];
    for (let i = 0; i < 80; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            radius: Math.random() * 3 + 2,
            dx: (Math.random() - 0.5) * 0.4, // slower movement
            dy: (Math.random() - 0.5) * 0.4,
            blur: Math.random() * 20 + 15,
            opacity: Math.random() * 0.5 + 0.2 // softer glow
        });
    }
}

function drawParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(0, 255, 255, ${p.opacity})`;
        ctx.shadowColor = "aqua";
        ctx.shadowBlur = p.blur;
        ctx.fill();

        // Move slowly
        p.x += p.dx;
        p.y += p.dy;

        // Bounce off edges
        if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
    });
}

function animate() {
    drawParticles();
    requestAnimationFrame(animate);
}

initParticles();
animate();

// Resize handler
window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    initParticles();
});

    </script>

</head>
<body>
    <canvas id="particle-canvas"></canvas>
    {% include 'navbar.html' %}
    <main class="container">
